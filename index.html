<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的记忆相册</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="wrap">
    <header class="hero">
      <p class="tag">PERSONAL MEMORY WALL</p>
      <h1>我的记忆相册</h1>
      <p class="subtitle">把日常、旅行和重要时刻，整理成可以回看的时间档案。</p>
      <div class="meta">
        <span id="photoCount">0 张照片</span>
        <span>点击任意照片可放大查看</span>
      </div>
    </header>

    <section class="gallery" id="gallery"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" id="closeBtn" aria-label="关闭">x</button>
    <img id="lightboxImg" alt="放大预览">
    <p id="lightboxCaption"></p>
  </div>

  <script src="./script.js"></script>
</body>
</html>
