<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>华东理工大学老相册</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="wrap">
    <header class="hero">
      <p class="tag">EAST CHINA UNIVERSITY OF SCIENCE AND TECHNOLOGY</p>
      <h1>华东理工大学老相册</h1>
      <p class="subtitle">以时间为轴，整理校园记忆中的人物、活动与场景，形成可持续更新的数字化相册。</p>
      <div class="line-art line-a" aria-hidden="true"></div>
      <div class="line-art line-b" aria-hidden="true"></div>
      <div class="line-art line-c" aria-hidden="true"></div>
      <div class="meta">
        <span id="photoCount">0 张照片</span>
        <span>点击任意照片可放大查看</span>
      </div>
    </header>

    <section class="gallery" id="gallery"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" id="closeBtn" aria-label="关闭">x</button>
    <img id="lightboxImg" alt="放大预览">
    <p id="lightboxCaption"></p>
  </div>

  <script src="./script.js"></script>
</body>
</html>
